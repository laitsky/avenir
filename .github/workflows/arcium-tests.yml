name: Arcium Build

on:
  push:
    branches: [main, master]
    paths:
      - "programs/**"
      - "encrypted-ixs/**"
      - "Anchor.toml"
      - "Arcium.toml"
      - "Cargo.toml"
      - "Cargo.lock"
  pull_request:
    branches: [main]
    paths:
      - "programs/**"
      - "encrypted-ixs/**"
      - "Anchor.toml"
      - "Arcium.toml"
      - "Cargo.toml"
      - "Cargo.lock"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  arcium-build:
    name: Build Programs & Circuits
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v2.3.0/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Configure Solana
        run: |
          export PATH="$HOME/.local/share/solana/install/active_release/bin:$PATH"
          solana --version
          solana-keygen new --no-bip39-passphrase

      - name: Cache Anchor CLI
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/avm
            ~/.cargo/bin/anchor
            ~/.avm
          key: ${{ runner.os }}-anchor-0.32.1
          restore-keys: |
            ${{ runner.os }}-anchor-

      - name: Install Anchor CLI
        run: |
          if ! command -v anchor &> /dev/null || [[ "$(anchor --version)" != *"0.32.1"* ]]; then
            cargo install --git https://github.com/coral-xyz/anchor avm --force
            avm install 0.32.1
            avm use 0.32.1
          fi
          anchor --version

      - name: Install Arcium CLI via arcup
        run: |
          curl "https://bin.arcium.com/download/arcup_x86_64_linux_0.8.5" -o ~/.cargo/bin/arcup
          chmod +x ~/.cargo/bin/arcup
          arcup install
          arcium --version

      - name: Build Arcium programs and circuits
        run: arcium build
