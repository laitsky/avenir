[localnet]
# number of nodes in the single cluster of the localnet
nodes = 2
# number of seconds to wait for the localnet to come online
localnet_timeout_secs = 600
# MPC backends this MXE supports (default: ["Cerberus"])
backends = ["Cerberus"]

[devnet]
# Arcium devnet cluster offset
# Used by getArciumEnv() when ARCIUM_CLUSTER=devnet
cluster_offset = 456
backends = ["Cerberus"]
